<!-- @dsCard group="Colors" viewport="700x150" subtitle="Alias semánticos: superficies, texto, bordes" name="Colores semánticos" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;font:var(--text-caption);color:var(--text-body);display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px;background:#fff}
.t{border-radius:var(--radius-sm);padding:10px;border:1px solid var(--border-soft)}
.dot{width:20px;height:20px;border-radius:50%;margin-bottom:6px;border:1px solid var(--border-soft)}</style></head><body>
<div class="t"><div class="dot" style="background:var(--surface-page)"></div>--surface-page</div>
<div class="t"><div class="dot" style="background:var(--surface-accent)"></div>--surface-accent</div>
<div class="t"><div class="dot" style="background:var(--surface-dark)"></div>--surface-dark</div>
<div class="t"><div class="dot" style="background:var(--surface-soft)"></div>--surface-soft</div>
<div class="t"><div class="dot" style="background:var(--text-title)"></div>--text-title</div>
<div class="t"><div class="dot" style="background:var(--text-body)"></div>--text-body</div>
<div class="t"><div class="dot" style="background:var(--text-muted)"></div>--text-muted</div>
<div class="t"><div class="dot" style="background:var(--border-soft)"></div>--border-soft</div>
</body></html>
