<!-- @dsCard group="Components" viewport="700x300" name="Display" subtitle="Card, Badge, Tag, Tabs" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:16px;background:var(--surface-page);font:var(--text-body);color:var(--text-body);display:grid;gap:14px}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.card{border-radius:var(--radius-lg);padding:18px;flex:1}</style></head><body>
<div class="row">
  <div class="card" style="background:#fff;box-shadow:var(--shadow-card)"><b style="color:var(--text-title)">Clase de prueba</b><br><span style="font:var(--text-small)">Ven como estés 🤍</span></div>
  <div class="card" style="background:var(--pf-lila)"><b style="color:var(--text-title)">Tono soft</b><br><span style="font:var(--text-small)">Fondo lila</span></div>
  <div class="card" style="background:var(--pf-morado);color:#fff"><b>Tono dark</b><br><span style="font:var(--text-small);color:#fff">Bloques destacados</span></div>
</div>
<div class="row">
  <span style="font:var(--text-caption);font-weight:600;padding:4px 12px;border-radius:999px;background:var(--pf-lavanda);color:#fff">Nueva ✨</span>
  <span style="font:var(--text-caption);font-weight:600;padding:4px 12px;border-radius:999px;background:var(--pf-lila);color:var(--pf-morado)">Wunda</span>
  <span style="font:var(--text-caption);font-weight:600;padding:4px 12px;border-radius:999px;background:var(--pf-exito-fondo);color:var(--pf-exito)">Reservada</span>
  <span style="font:var(--text-caption);font-weight:600;padding:4px 12px;border-radius:999px;background:var(--pf-rosa);color:var(--pf-morado)">2 lugares</span>
</div>
<div class="row">
  <button style="font:var(--text-small);font-weight:500;padding:8px 18px;border-radius:999px;border:none;background:var(--pf-morado);color:#fff">Hipopresivos</button>
  <button style="font:var(--text-small);font-weight:500;padding:8px 18px;border-radius:999px;border:none;background:#fff;color:var(--pf-morado)">Posparto</button>
  <button style="font:var(--text-small);font-weight:500;padding:8px 18px;border-radius:999px;border:none;background:#fff;color:var(--pf-morado)">Oficina</button>
</div>
<div style="display:inline-flex;gap:4px;background:#fff;border-radius:999px;padding:4px;width:fit-content">
  <span style="font:var(--text-small);font-weight:600;padding:10px 22px;border-radius:999px;background:var(--pf-lavanda);color:#fff">Clases</span>
  <span style="font:var(--text-small);font-weight:600;padding:10px 22px;border-radius:999px;color:var(--pf-morado)">Cursos</span>
  <span style="font:var(--text-small);font-weight:600;padding:10px 22px;border-radius:999px;color:var(--pf-morado)">Tips</span>
</div>
</body></html>
