<!-- @dsCard group="Components" viewport="700x280" name="Feedback" subtitle="Dialog, Toast, Tooltip" -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>body{margin:0;padding:16px;background:var(--surface-page);font:var(--text-body);color:var(--text-body);display:grid;gap:14px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}</style></head><body>
<div style="background:#fff;border-radius:var(--radius-xl);box-shadow:var(--shadow-float);padding:24px;max-width:400px">
  <div style="font:var(--text-h2);color:var(--text-title);margin-bottom:8px">Confirma tu lugar</div>
  <div style="font:var(--text-small)">Lunes 9:00, presencial. Cupo de 8 personas.</div>
  <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
    <button style="font:var(--text-button);border:none;border-radius:999px;padding:12px 26px;background:transparent;color:var(--pf-morado)">Cambiar</button>
    <button style="font:var(--text-button);border:none;border-radius:999px;padding:12px 26px;background:var(--pf-lavanda);color:#fff">Confirmar ✨</button>
  </div>
</div>
<div class="row">
  <span style="display:inline-flex;gap:10px;font:var(--text-body-strong);padding:14px 22px;border-radius:999px;box-shadow:var(--shadow-float);background:var(--pf-exito-fondo);color:var(--pf-exito)">Tu lugar está reservado ✨</span>
  <span style="display:inline-flex;gap:10px;font:var(--text-body-strong);padding:14px 22px;border-radius:999px;box-shadow:var(--shadow-float);background:var(--pf-error-fondo);color:var(--pf-error)">Revisa tu correo</span>
  <span style="background:var(--pf-morado);color:#fff;font:var(--text-caption);padding:6px 14px;border-radius:999px">Tooltip: cupo de 8</span>
</div>
</body></html>
